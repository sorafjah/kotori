<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>そらとぶことり 〜おおぞら探検〜</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; touch-action:manipulation; overscroll-behavior:none;
    -webkit-text-size-adjust:100%; -webkit-user-select:none; user-select:none;
    font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic',sans-serif; background:#9fd8ef; }
  canvas { display:block; }
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }

  /* 空腹ゲージ */
  #hungerWrap { position:absolute; top:calc(env(safe-area-inset-top,0px) + 12px); left:14px;
    display:flex; align-items:center; gap:8px; }
  #hungerWrap .icon { font-size:22px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.3)); }
  #hungerBar { width:180px; height:20px; background:rgba(0,0,0,.35); border-radius:12px;
    border:2px solid rgba(255,255,255,.8); overflow:hidden; }
  #hungerFill { height:100%; width:100%; border-radius:9px;
    background:linear-gradient(90deg,#8bd450,#c8e86a); transition:width .25s; }
  #hungerFill.low { background:linear-gradient(90deg,#ff5a5a,#ffa040); animation:pulse .6s infinite alternate; }
  @keyframes pulse { from{opacity:1} to{opacity:.55} }

  /* スコア */
  #scoreWrap { position:absolute; top:calc(env(safe-area-inset-top,0px) + 12px); right:14px;
    text-align:right; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.45); font-weight:bold; }
  #timeTxt { font-size:24px; }
  #bugTxt { font-size:17px; }

  /* 警告 */
  #warnBanner { position:absolute; top:calc(env(safe-area-inset-top,0px) + 52px); left:50%;
    transform:translateX(-50%); background:rgba(220,40,40,.88); color:#fff; font-weight:bold;
    font-size:19px; padding:8px 20px; border-radius:24px; display:none;
    animation:warnblink .5s infinite alternate; box-shadow:0 2px 10px rgba(0,0,0,.3); }
  @keyframes warnblink { from{transform:translateX(-50%) scale(1)} to{transform:translateX(-50%) scale(1.06)} }
  #vignette { position:absolute; inset:0; pointer-events:none; opacity:0; transition:opacity .4s;
    box-shadow:inset 0 0 120px 40px rgba(220,30,30,.55); }
  #vignette.on { opacity:1; animation:pulse .7s infinite alternate; }
  #vignette.hit { opacity:1; transition:none; box-shadow:inset 0 0 140px 60px rgba(255,120,40,.7); }

  #toast { position:absolute; bottom:32%; left:50%; transform:translateX(-50%);
    background:rgba(30,60,90,.8); color:#fff; font-weight:bold; font-size:17px;
    padding:8px 18px; border-radius:20px; opacity:0; transition:opacity .3s; white-space:nowrap; }

  /* 仮想スティック */
  #joyBase { position:fixed; left:26px; bottom:calc(env(safe-area-inset-bottom,0px) + 26px);
    width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,.18);
    border:3px solid rgba(255,255,255,.55); z-index:20; touch-action:none; }
  #joyKnob { position:absolute; left:50%; top:50%; width:64px; height:64px; border-radius:50%;
    background:rgba(255,255,255,.75); box-shadow:0 2px 8px rgba(0,0,0,.25);
    transform:translate(-50%,-50%); pointer-events:none; }

  /* ボタン */
  #btns { position:fixed; right:22px; bottom:calc(env(safe-area-inset-bottom,0px) + 22px);
    display:flex; flex-direction:column; gap:14px; z-index:20; align-items:flex-end; }
  #btns button { min-width:84px; min-height:64px; border-radius:32px; border:3px solid rgba(255,255,255,.7);
    background:rgba(40,90,140,.6); color:#fff; font-size:18px; font-weight:bold;
    font-family:inherit; touch-action:none; padding:0 20px;
    box-shadow:0 3px 8px rgba(0,0,0,.25); }
  #btns button:active, #btns button.held { background:rgba(255,200,60,.85); color:#333; }
  #btnAct.ready { background:rgba(80,200,110,.85); animation:pulse .7s infinite alternate; }

  /* オーバーレイ */
  .overlay { position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; text-align:center;
    background:rgba(20,50,80,.55); backdrop-filter:blur(4px); color:#fff; padding:20px; }
  .overlay h1 { font-size:clamp(30px,7vw,52px); text-shadow:0 3px 0 rgba(0,0,0,.25); letter-spacing:.05em; }
  .overlay p { font-size:16px; line-height:1.9; text-shadow:0 1px 3px rgba(0,0,0,.4); }
  .overlay .bigbtn { min-width:220px; min-height:64px; font-size:22px; font-weight:bold;
    font-family:inherit; border:none; border-radius:32px; cursor:pointer;
    background:linear-gradient(180deg,#ffd75e,#ff9f43); color:#5a3200;
    box-shadow:0 4px 0 #c96f1e, 0 6px 14px rgba(0,0,0,.3); }
  .overlay .bigbtn:active { transform:translateY(3px); box-shadow:0 1px 0 #c96f1e; }
  .overlay .stats { font-size:20px; font-weight:bold; background:rgba(255,255,255,.15);
    padding:12px 26px; border-radius:16px; line-height:1.8; }
  #overOverlay { display:none; }
  .ctrlhint { font-size:14px; opacity:.9; }
</style>
</head>
<body>
<div id="hud">
  <div id="hungerWrap"><span class="icon">🐛</span><div id="hungerBar"><div id="hungerFill"></div></div></div>
  <div id="scoreWrap"><div id="timeTxt">0:00</div><div id="bugTxt">🐛 ×0</div></div>
  <div id="warnBanner">⚠️ みつかった！にげろ！</div>
  <div id="toast"></div>
  <div id="vignette"></div>
</div>
<div id="joyBase"><div id="joyKnob"></div></div>
<div id="btns">
  <button id="btnFast">加速</button>
  <button id="btnSlow">減速</button>
  <button id="btnAct">とまる</button>
</div>

<div id="startOverlay" class="overlay">
  <h1>🐦 そらとぶことり</h1>
  <p>大空をとびまわろう！<br>
  🐛 虫をたべて おなかを満たそう<br>
  🌪 上昇気流にのると らくに高くとべる<br>
  🦊 キツネと 🦅 大きな鳥に見つかったら…にげろ！<br>
  🌲 木にとまれば かくれられるよ</p>
  <p class="ctrlhint">左スティック：飛ぶ方向　／　右ボタン：加速・減速・とまる<br>
  （キーボード：矢印/WASD・Shift加速・X減速・Spaceでとまる）</p>
  <button id="btnStart" class="bigbtn">タップしてスタート！</button>
</div>

<div id="overOverlay" class="overlay">
  <h1 id="overTitle">ゲームオーバー</h1>
  <p id="overReason"></p>
  <div class="stats" id="overStats"></div>
  <button id="btnRestart" class="bigbtn">もういちど とぶ！</button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
} }
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

/* ダブルタップ拡大・ピンチ拡大を抑制(iOS Safari は maximum-scale を無視するため) */
let __lastTap = 0;
document.addEventListener('touchend', e=>{
  const now = Date.now();
  if(now - __lastTap < 350){ e.preventDefault(); }
  __lastTap = now;
}, {passive:false});
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('dblclick', e=>e.preventDefault());

/* ================= 基本定数・状態 ================= */
const MAP_R = 195;          // 飛べる範囲の半径
const GROUND_Y = 0.5;       // 地面すれすれ高度
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const rnd = (a=1,b=0)=>b+Math.random()*(a-b);

const S = {
  running:false, over:false, time:0,
  hunger:100, bugs:0,
  yaw:0, pitch:0, bank:0, speed:14,
  perched:false, perchTree:null,
  hitCd:0, boundToastCd:0,
  flapPhase:0, lastFlapSin:0,
};
let pendingTreeHit = false;
const windVel = new THREE.Vector3();

/* ================= オーディオ (Web Audio API) ================= */
let AC=null, master=null, windGain=null, windFilter=null;
let bgmNext=0, bgmI=0;
const SCALE=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25]; // Cメジャーペンタ寄り
const MELODY=[0,2,3,5,3,2,0,-1, 1,2,3,2,1,-1,0,-1, 3,5,6,5,3,2,1,-1, 2,3,2,1,0,-1,-1,-1];

function ensureAudio(){
  if(AC) return;
  AC = new (window.AudioContext||window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0.55; master.connect(AC.destination);
  // 風の環境音(常時ループ、音量だけ制御)
  const len = 2*AC.sampleRate;
  const buf = AC.createBuffer(1,len,AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src = AC.createBufferSource(); src.buffer=buf; src.loop=true;
  windFilter = AC.createBiquadFilter(); windFilter.type='lowpass'; windFilter.frequency.value=420;
  windGain = AC.createGain(); windGain.gain.value=0;
  src.connect(windFilter); windFilter.connect(windGain); windGain.connect(master);
  src.start();
}
function tone(f,d=0.2,type='sine',v=0.15,slide=null,delay=0){
  if(!AC) return;
  const t = AC.currentTime+delay;
  const o = AC.createOscillator(); o.type=type; o.frequency.setValueAtTime(Math.max(30,f),t);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,slide),t+d);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(v,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+d+0.05);
}
function noiseBurst(dur=0.15,freq=800,v=0.12){
  if(!AC) return;
  const t=AC.currentTime;
  const n=Math.floor(AC.sampleRate*dur);
  const buf=AC.createBuffer(1,n,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src=AC.createBufferSource(); src.buffer=buf;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq; bp.Q.value=1.2;
  const g=AC.createGain();
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(bp); bp.connect(g); g.connect(master); src.start();
}
const sfx = {
  flap(){ noiseBurst(0.11,900,0.06); },
  eat(){ tone(700,0.1,'square',0.11,1400); tone(1050,0.1,'square',0.08,1700,0.07); },
  alert(){ tone(880,0.16,'sawtooth',0.13,660); tone(660,0.22,'sawtooth',0.11,440,0.16); },
  safe(){ tone(523,0.14,'triangle',0.1,784); tone(784,0.18,'triangle',0.08,1046,0.12); },
  hit(){ noiseBurst(0.2,220,0.2); tone(150,0.16,'square',0.1,80); },
  gust(){ noiseBurst(0.8,320,0.13); },
  perch(){ tone(500,0.08,'triangle',0.1,620); },
  over(){ tone(440,0.3,'triangle',0.13,330); tone(330,0.3,'triangle',0.12,262,0.28); tone(262,0.6,'triangle',0.12,196,0.56); },
};
function updateBGM(){
  if(!AC || !S.running || S.over) return;
  while(bgmNext < AC.currentTime + 0.15){
    const step = MELODY[bgmI % MELODY.length];
    const delay = Math.max(0, bgmNext - AC.currentTime);
    if(step >= 0){
      tone(SCALE[step], 0.35, 'triangle', 0.045, null, delay);
      if(bgmI % 8 === 0) tone(SCALE[step]/2, 0.7, 'sine', 0.05, null, delay);
    }
    bgmI++; bgmNext += 0.42;
  }
}
function updateWindAudio(dt){
  if(!windGain) return;
  const target = S.running && !S.over
    ? clamp((S.speed-10)/60,0,0.22) + (windVel.lengthSq()>4 ? 0.16 : 0)
    : 0;
  windGain.gain.value += (target - windGain.gain.value) * Math.min(1, dt*3);
  windFilter.frequency.value = 300 + S.speed*18;
}

/* ================= レンダラ・シーン・物理 ================= */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd8ef);
scene.fog = new THREE.Fog(0x9fd8ef,130,430);
const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,900);
camera.position.set(0,24,-46);

scene.add(new THREE.HemisphereLight(0xcfeaff,0x6fa84f,0.95));
const sun = new THREE.DirectionalLight(0xfff4d8,1.05);
sun.position.set(60,110,40);
scene.add(sun);

const world = new CANNON.World({gravity:new CANNON.Vec3(0,0,0)});
world.broadphase = new CANNON.SAPBroadphase(world);
const groundBody = new CANNON.Body({mass:0,shape:new CANNON.Plane()});
groundBody.quaternion.setFromEuler(-Math.PI/2,0,0);
groundBody.position.y = 0.35;
world.addBody(groundBody);

const lam = c => new THREE.MeshLambertMaterial({color:c});

/* ---- UIヘルパー(演出用に先に定義) ---- */
const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg,dur=2200){
  toastEl.textContent = msg;
  toastEl.style.opacity = 1;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.style.opacity=0,dur);
}

/* ================= 地形 ================= */
// 草原(円形の地面)
const groundMesh = new THREE.Mesh(new THREE.CircleGeometry(300,48), lam(0x7ec850));
groundMesh.rotation.x = -Math.PI/2;
scene.add(groundMesh);

// 森の下草(濃い緑の円)
const patches = [ {x:-90,z:-60,r:72,n:58}, {x:80,z:90,r:58,n:44} ];
for(const p of patches){
  const m = new THREE.Mesh(new THREE.CircleGeometry(p.r+6,32), lam(0x5f9e3a));
  m.rotation.x = -Math.PI/2; m.position.set(p.x,0.02,p.z);
  scene.add(m);
}

// 草(インスタンシング)
{
  const g = new THREE.ConeGeometry(0.22,0.85,5);
  const im = new THREE.InstancedMesh(g, lam(0x66b13f), 150);
  const M = new THREE.Matrix4(), q = new THREE.Quaternion(), sc = new THREE.Vector3();
  for(let i=0;i<150;i++){
    const a=rnd(Math.PI*2), r=Math.sqrt(Math.random())*180;
    sc.setScalar(rnd(1.6,0.7));
    q.setFromEuler(new THREE.Euler(rnd(0.15,-0.15),rnd(Math.PI),rnd(0.15,-0.15)));
    M.compose(new THREE.Vector3(Math.cos(a)*r,0.35,Math.sin(a)*r),q,sc);
    im.setMatrixAt(i,M);
  }
  scene.add(im);
}
// 花
{
  const g = new THREE.SphereGeometry(0.16,6,5);
  const im = new THREE.InstancedMesh(g, new THREE.MeshLambertMaterial(), 70);
  const cols = [0xff8fb3,0xfff06e,0xffffff,0xffa060];
  const M = new THREE.Matrix4();
  for(let i=0;i<70;i++){
    const a=rnd(Math.PI*2), r=Math.sqrt(Math.random())*170;
    M.makeTranslation(Math.cos(a)*r,0.5,Math.sin(a)*r);
    im.setMatrixAt(i,M);
    im.setColorAt(i,new THREE.Color(cols[i%cols.length]));
  }
  scene.add(im);
}

// 遠くの山なみ(装飾・当たり判定なし)
for(let i=0;i<12;i++){
  const a = i/12*Math.PI*2 + rnd(0.2);
  const r = rnd(345,285), h = rnd(115,60);
  const mtn = new THREE.Mesh(new THREE.ConeGeometry(h*0.65,h,7), lam(0x8ba4bd));
  mtn.position.set(Math.cos(a)*r,h/2-4,Math.sin(a)*r);
  scene.add(mtn);
  const snow = new THREE.Mesh(new THREE.ConeGeometry(h*0.24,h*0.34,7), lam(0xf4fbff));
  snow.position.set(mtn.position.x,h-h*0.18,mtn.position.z);
  scene.add(snow);
}

// 雲(ゆっくり流れる)
const clouds = [];
for(let i=0;i<9;i++){
  const g = new THREE.Group();
  const n = 3+Math.floor(rnd(3));
  for(let j=0;j<n;j++){
    const s = new THREE.Mesh(new THREE.SphereGeometry(rnd(7,3.5),10,8),
      new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:0.9}));
    s.position.set(rnd(8,-8),rnd(2,-1),rnd(5,-5));
    s.scale.y = 0.55;
    g.add(s);
  }
  g.position.set(rnd(240,-240),rnd(78,46),rnd(240,-240));
  scene.add(g);
  clouds.push({g,spd:rnd(2.2,0.7)});
}

function makeGlowTexture(){
  const cv = document.createElement('canvas'); cv.width=cv.height=64;
  const ctx = cv.getContext('2d');
  const gr = ctx.createRadialGradient(32,32,2,32,32,30);
  gr.addColorStop(0,'rgba(255,255,220,0.9)');
  gr.addColorStop(1,'rgba(255,255,220,0)');
  ctx.fillStyle = gr; ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(cv);
}
const glowTex = makeGlowTexture();

/* ================= 木の実・花(地上/低空のたべもの) ================= */
const foods = []; // {m, type:'berry'|'flower', by}
const berryGeo = new THREE.SphereGeometry(0.32,10,8);
const berryMat = new THREE.MeshLambertMaterial({color:0xc23b6b,emissive:0x3a0014});
function makeFlower(){
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.06,1.1,5), lam(0x4a9a3a));
  stem.position.y = 0.55; g.add(stem);
  const cols=[0xffe14d,0xff7fa8,0xffffff,0xff9a4d,0xb98bff];
  const petalMat = new THREE.MeshLambertMaterial({color:cols[Math.floor(rnd(cols.length))],
    emissive:0x221100, side:THREE.DoubleSide});
  for(let i=0;i<6;i++){
    const p = new THREE.Mesh(new THREE.CircleGeometry(0.34,7), petalMat);
    const a = i/6*Math.PI*2;
    p.position.set(Math.cos(a)*0.34,1.12,Math.sin(a)*0.34);
    p.lookAt(p.position.x*3,1.6,p.position.z*3);
    g.add(p);
  }
  const center = new THREE.Mesh(new THREE.SphereGeometry(0.2,8,7), lam(0xffcf3a));
  center.position.y = 1.12; g.add(center);
  return g;
}
function spawnFood(type, x, z, by){
  let m;
  if(type==='berry'){
    m = new THREE.Group();
    for(let i=0;i<3;i++){
      const b = new THREE.Mesh(berryGeo, berryMat);
      b.position.set(rnd(0.25,-0.25),rnd(0.25,-0.25),rnd(0.25,-0.25));
      m.add(b);
    }
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,transparent:true,depthWrite:false,opacity:0.4}));
    sp.scale.setScalar(2.4); m.add(sp);
  } else {
    m = makeFlower();
  }
  m.position.set(x,by,z);
  scene.add(m);
  foods.push({m,type,by,x,z,phase:rnd(Math.PI*2)});
}
function respawnFood(f){
  // 花は地面、木の実は木の近くの低空に再配置
  if(f.type==='flower'){
    const a=rnd(Math.PI*2), r=rnd(150,20);
    f.x=Math.cos(a)*r; f.z=Math.sin(a)*r; f.by=0;
  } else {
    const tr = trees[Math.floor(rnd(trees.length))];
    const a=rnd(Math.PI*2), r=rnd(2.5,1);
    f.x=tr.x+Math.cos(a)*r; f.z=tr.z+Math.sin(a)*r; f.by=tr.topY*0.55+1;
  }
  f.m.position.set(f.x,f.by,f.z);
}
function updateFoods(t){
  for(const f of foods){
    if(f.type==='berry'){
      f.m.position.y = f.by + Math.sin(t*1.5+f.phase)*0.15;
      f.m.rotation.y += 0.01;
    } else {
      f.m.rotation.y = Math.sin(t*0.8+f.phase)*0.15;
    }
  }
}


/* ================= 木(見た目 + cannon衝突体 + とまり場所) ================= */
const trees = [];
const trunkMat = lam(0x8a5a33);
const leafCols = [0x3f9e46,0x55b04e,0x2f8d52,0x6cbf58];

function addTree(x,z){
  const h = rnd(6.8,3.6);
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.52,h,6),trunkMat);
  trunk.position.y = h/2;
  g.add(trunk);
  const lc = lam(leafCols[Math.floor(rnd(leafCols.length))]);
  let topY, fr;
  if(Math.random()<0.5){ // 針葉樹タイプ
    const c1 = new THREE.Mesh(new THREE.ConeGeometry(2.0,3.4,7),lc); c1.position.y = h+1.0;
    const c2 = new THREE.Mesh(new THREE.ConeGeometry(1.35,2.6,7),lc); c2.position.y = h+2.8;
    g.add(c1,c2);
    topY = h+4.1; fr = 1.7;

const zones = [];
let zoneTimer = 2.5;
function spawnZone(){
  const type = Math.random()<0.62 ? 'up' : 'gust';
  const a = rnd(Math.PI*2), dist = rnd(95,32);
  const x = clamp(birdBody.position.x + Math.cos(a)*dist, -168, 168);
  const z = clamp(birdBody.position.z + Math.sin(a)*dist, -168, 168);
  if(Math.hypot(x,z) > 172) return;
  const radius = type==='up' ? 9 : 13;
  const h = type==='up' ? 56 : 26;

  const count = 120;
  const posArr = new Float32Array(count*3);
  const spd = new Float32Array(count);
  for(let i=0;i<count;i++){
    const aa=rnd(Math.PI*2), rr=Math.sqrt(Math.random())*radius;
    posArr[i*3]   = Math.cos(aa)*rr;
    posArr[i*3+1] = rnd(h);
    posArr[i*3+2] = Math.sin(aa)*rr;
    spd[i] = rnd(9,4);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(posArr,3));
  const mat = new THREE.PointsMaterial({
    color: type==='up'?0xffffff:0xdff6ff, size:0.55,
    transparent:true, opacity:0.8, depthWrite:false});
  const pts = new THREE.Points(geo,mat);
  pts.position.set(x,0.5,z);
  scene.add(pts);

  let ring = null;
  if(type==='up'){
    ring = new THREE.Mesh(new THREE.RingGeometry(radius-1.2,radius,36),
      new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.5,side:THREE.DoubleSide}));
    ring.rotation.x = -Math.PI/2; ring.position.set(x,0.15,z);
    scene.add(ring);
  }
  const ga = rnd(Math.PI*2);
  const dir = new THREE.Vector3(Math.cos(ga),0,Math.sin(ga));
  zones.push({type,x,z,radius,h,dir,life:22,pts,ring,mat,spd,geo,entered:false});
}
function removeZone(z){
  scene.remove(z.pts); z.geo.dispose(); z.mat.dispose();
  if(z.ring){ scene.remove(z.ring); z.ring.geometry.dispose(); z.ring.material.dispose(); }
}
function updateZones(dt){
  zoneTimer -= dt;
  if(zoneTimer<=0 && zones.length<4){ spawnZone(); zoneTimer = rnd(8,5.5); }
  for(let i=zones.length-1;i>=0;i--){
    const z = zones[i];
    z.life -= dt;
    if(z.life<=0){ removeZone(z); zones.splice(i,1); continue; }
    const fade = clamp(z.life/3,0,1);
    z.mat.opacity = 0.8*fade;
    if(z.ring) z.ring.material.opacity = 0.5*fade;
    // 粒子アニメーション
    const arr = z.geo.attributes.position.array;
    for(let j=0;j<z.spd.length;j++){
      if(z.type==='up'){
        arr[j*3+1] += z.spd[j]*dt;
        if(arr[j*3+1] > z.h) arr[j*3+1] = 0;
        arr[j*3]   += Math.sin(arr[j*3+1]*0.5+j)*dt*0.7;
      } else {
        arr[j*3]   += z.dir.x*(z.spd[j]+7)*dt;
        arr[j*3+2] += z.dir.z*(z.spd[j]+7)*dt;
        const dx=arr[j*3], dz=arr[j*3+2];
        if(dx*dx+dz*dz > z.radius*z.radius){
          arr[j*3]   = -z.dir.x*z.radius*0.9 + rnd(3,-3);
          arr[j*3+2] = -z.dir.z*z.radius*0.9 + rnd(3,-3);
        }
      }
    }
    z.geo.attributes.position.needsUpdate = true;
  }
}
function applyWind(){
  windVel.set(0,0,0);
  let inside = false;
  for(const z of zones){
    const dx = birdBody.position.x - z.x, dz = birdBody.position.z - z.z;
    const d = Math.hypot(dx,dz);
    if(d < z.radius){
      if(z.type==='up' && birdBody.position.y < z.h+6){
        windVel.y += 11*(1 - (d/z.radius)*0.45);
        inside = true;
      } else if(z.type==='gust'){
        windVel.x += z.dir.x*15; windVel.z += z.dir.z*15; windVel.y += 2;
        inside = true;
      }
      if(!z.entered){ z.entered = true; sfx.gust(); toast(z.type==='up'?'🌪 上昇気流だ！':'💨 突風にのった！',1500); }
    }
  }
  return inside;
}

function updateOneFox(fox,dt,t){
  const g = fox.g, bp = birdBody.position;
  const dx = bp.x-g.position.x, dz = bp.z-g.position.z;
  const d2 = Math.hypot(dx,dz);
  let moveDir = null, spd = 0;

  if(!fox.chasing){
    // しばらくうろうろしてから、近くて低空なら追跡開始
    fox.wanderT -= dt;
    const canSpot = d2<22 && bp.y<7 && !S.perched && fox.wanderT<=0;
    if(canSpot){
      fox.chasing = true; fox.loseT = 0; sfx.alert();
    } else {
      if(!fox.hasWp || g.position.distanceTo(fox.wp)<3){
        const a=rnd(Math.PI*2), r=Math.sqrt(Math.random())*160;
        fox.wp.set(Math.cos(a)*r,0,Math.sin(a)*r); fox.hasWp = true;
      }
      moveDir = fox.wp.clone().sub(g.position); moveDir.y=0;
      spd = 3.4;   // のんびり徘徊
    }
  }
  if(fox.chasing){
    if(S.perched){ fox.loseT += dt; } else fox.loseT = 0;
    if(fox.loseT>1.4 || d2>50 || bp.y>16){
      fox.chasing = false; fox.hasWp = false; fox.wanderT = rnd(3,1);
      sfx.safe(); toast('🦊 にげきった！');
    } else {
      moveDir = new THREE.Vector3(dx,0,dz); spd = 9.5;
      if(d2<2.8 && bp.y<3.0 && !S.perched){ gameOver('fox'); return; }
    }
  }
  if(moveDir && moveDir.lengthSq()>0.01){
    moveDir.normalize();
    g.position.addScaledVector(moveDir,spd*dt);
    const r = Math.hypot(g.position.x,g.position.z);
    if(r>185){ g.position.multiplyScalar(185/r); fox.hasWp=false; }
    const ty = Math.atan2(moveDir.x,moveDir.z);
    let dy = ty - g.rotation.y;
    while(dy>Math.PI) dy-=Math.PI*2; while(dy<-Math.PI) dy+=Math.PI*2;
    g.rotation.y += dy*Math.min(1,dt*6);
    fox.legPhase += dt*spd*1.6;
    fox.g.userData.legs.forEach((L,i)=>L.rotation.x = Math.sin(fox.legPhase+(i%2)*Math.PI)*0.55);
    g.position.y = Math.abs(Math.sin(fox.legPhase))*0.13;
  } else {
    fox.g.userData.legs.forEach(L=>L.rotation.x*=0.9);
    g.position.y *= 0.9;
  }
  // マーカー(常時表示、追跡中は赤く強調)
  fox.marker.position.set(g.position.x,0,g.position.z);
  const rm = fox.marker.userData.ring;
  const pulse = 0.4 + Math.sin(t*4)*0.15;
  rm.material.opacity = fox.chasing ? 0.75 : pulse*0.55;
  rm.material.color.setHex(fox.chasing ? 0xff2200 : 0xffaa33);
  fox.marker.scale.setScalar(fox.chasing ? 1.25 : 1);
  fox.ex.visible = fox.chasing;
  if(fox.chasing) fox.ex.position.set(g.position.x, g.position.y+3.2+Math.sin(t*8)*0.15, g.position.z);
}
function updateFox(dt,t){

    if(S.over) return;
  }
}

    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.08,6,5),
      new THREE.MeshBasicMaterial({color:0xffd24a}));
    eye.position.set(sx*0.18,0.32,1.02);
    const pu = new THREE.Mesh(new THREE.SphereGeometry(0.04,6,4),
      new THREE.MeshBasicMaterial({color:0x111111}));
    pu.position.set(sx*0.19,0.32,1.08);
    const brow = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.05,0.08), lam(0x2e1d14));
    brow.position.set(sx*0.18,0.42,1.0); brow.rotation.z = sx*-0.4;
    g.add(eye,pu,brow);
  }
  const hwGeo = new THREE.BoxGeometry(1.7,0.08,0.7);
  hwGeo.translate(0.85,0,0);
  hawk.wL = new THREE.Mesh(hwGeo, lam(0x5e4130));
  hawk.wR = new THREE.Mesh(hwGeo, lam(0x5e4130));
  hawk.wL.position.set(0.3,0.1,0); hawk.wR.position.set(-0.3,0.1,0);
  hawk.wR.scale.x = -1;
  g.add(hawk.wL,hawk.wR);
  g.rotation.order = 'YXZ';
  g.scale.setScalar(1.5);
  g.position.set(-90,30,-70);
  scene.add(g);
}
function updateHawk(dt,t){
  const g = hawk.g, bp = birdBody.position;
  const d3 = g.position.distanceTo(bp);
  let vel = new THREE.Vector3();

  if(!hawk.chasing){
    if(d3<72 && !S.perched && bp.y>2){
      hawk.chasing = true; hawk.loseT = 0;
      sfx.alert();
    } else {
      hawk.ca += dt*0.28;
      hawk.cx += Math.sin(t*0.13)*dt*4;
      hawk.cz += Math.cos(t*0.11)*dt*4;
      const tx = clamp(hawk.cx,-150,150) + Math.cos(hawk.ca)*32;
      const tz = clamp(hawk.cz,-150,150) + Math.sin(hawk.ca)*32;
      const ty = 26 + Math.sin(t*0.4)*5;
      vel.set(tx-g.position.x, ty-g.position.y, tz-g.position.z);
      const L = vel.length();
      if(L>0.1) vel.multiplyScalar(Math.min(9,L*1.5)/L);
    }
  }
  if(hawk.chasing){
    if(S.perched){ hawk.loseT += dt; } else hawk.loseT = 0;
    if(hawk.loseT>1.5 || d3>95){
      hawk.chasing = false;
      sfx.safe(); toast('🦅 にげきった！');
    } else {
      vel.copy(bp).sub(g.position);
      const L = vel.length();
      if(L>0.1) vel.multiplyScalar(17.5/L);  // プレイヤー最高速(30)より遅い→振り切れる
      if(d3<2.2 && !S.perched){ gameOver('hawk'); return; }
    }
  }
  g.position.addScaledVector(vel,dt);
  g.position.y = clamp(g.position.y,4,70);
  const r = Math.hypot(g.position.x,g.position.z);
  if(r>185) g.position.multiplyScalar(185/r);
  if(vel.lengthSq()>0.5){
    const ty = Math.atan2(vel.x,vel.z);
    let dy = ty - g.rotation.y;
    while(dy>Math.PI) dy-=Math.PI*2; while(dy<-Math.PI) dy+=Math.PI*2;
    g.rotation.y += dy*Math.min(1,dt*4);
    g.rotation.x = clamp(-Math.asin(clamp(vel.y/Math.max(1,vel.length()),-1,1)),-0.6,0.6);
  }
  hawk.flap += dt*(hawk.chasing?11:6);
  const ang = Math.sin(hawk.flap)*(hawk.chasing?0.7:0.45);
  hawk.wL.rotation.z = ang; hawk.wR.rotation.z = -ang;
  hawk.ex.visible = hawk.chasing;
  if(hawk.chasing) hawk.ex.position.set(g.position.x, g.position.y+2.4+Math.sin(t*8)*0.15, g.position.z);
}

/* ================= 木にとまる ================= */
function nearPerch(){
  let best=null, bd=7.0;
  const bp = birdBody.position;
  for(const tr of trees){
    const dh = Math.hypot(bp.x-tr.x, bp.z-tr.z);
    if(dh<bd && Math.abs(bp.y-tr.topY)<7.5){ bd=dh; best=tr; }
  }
  return best;
}
function perchOn(tr){
  S.perched = true; S.perchTree = tr; S.speed = 0;
  birdBody.velocity.set(0,0,0);
  birdBody.position.set(tr.x, tr.topY+0.45, tr.z);
  sfx.perch();
  toast('🌲 木にとまった！かくれているよ');
}
function takeOff(){
  S.perched = false; S.perchTree = null;
  S.speed = 11; S.pitch = 0.18;
  birdBody.position.y += 0.7;
  sfx.flap();
}

/* ================= 入力(仮想スティック・ボタン・キーボード) ================= */
const input = { x:0, y:0, fast:false, slow:false };
const joyBase = document.getElementById('joyBase');
const joyKnob = document.getElementById('joyKnob');
let joyId = null;
function joyMove(e){
  const r = joyBase.getBoundingClientRect();
  const cx = r.left+r.width/2, cy = r.top+r.height/2;
  let dx = e.clientX-cx, dy = e.clientY-cy;
  const R = r.width/2 - 10;
  const L = Math.hypot(dx,dy);
  if(L>R){ dx*=R/L; dy*=R/L; }
  joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  input.x = dx/R;
  input.y = -dy/R;
}
joyBase.addEventListener('pointerdown', e=>{
  e.preventDefault(); joyId = e.pointerId;
  joyBase.setPointerCapture(e.pointerId); joyMove(e);
});
joyBase.addEventListener('pointermove', e=>{ if(e.pointerId===joyId) joyMove(e); });
function joyEnd(e){
  if(e.pointerId!==joyId) return;
  joyId = null; input.x = 0; input.y = 0;
  joyKnob.style.transform = 'translate(-50%,-50%)';
}
joyBase.addEventListener('pointerup', joyEnd);
joyBase.addEventListener('pointercancel', joyEnd);

const btnState = { fast:false, slow:false };
function holdBtn(id,key){
  const el = document.getElementById(id);
  const on = e=>{ e.preventDefault(); btnState[key]=true; el.classList.add('held'); };
  const off = e=>{ btnState[key]=false; el.classList.remove('held'); };
  el.addEventListener('pointerdown',on);
  el.addEventListener('pointerup',off);
  el.addEventListener('pointercancel',off);
  el.addEventListener('pointerleave',off);
}
holdBtn('btnFast','fast');
holdBtn('btnSlow','slow');
const btnAct = document.getElementById('btnAct');
function doAction(){
  if(!S.running || S.over) return;
  if(S.perched){ takeOff(); return; }
  const tr = nearPerch();
  if(tr) perchOn(tr);
  else toast('ちかくに とまれる木がないよ',1400);
}
btnAct.addEventListener('pointerdown', e=>{ e.preventDefault(); doAction(); });

const keys = {};
addEventListener('keydown', e=>{
  if(e.repeat) return;
  keys[e.code] = true;
  if(e.code==='Space'){ e.preventDefault(); doAction(); }
});
addEventListener('keyup', e=>{ keys[e.code] = false; });
function pollKeys(){
  if(joyId===null){
    let kx=0, ky=0;
    if(keys.ArrowLeft||keys.KeyA)  kx -= 1;
    if(keys.ArrowRight||keys.KeyD) kx += 1;
    if(keys.ArrowUp||keys.KeyW)    ky += 1;
    if(keys.ArrowDown||keys.KeyS)  ky -= 1;
    input.x = kx; input.y = ky;
  }
  input.fast = btnState.fast || !!(keys.ShiftLeft||keys.ShiftRight);
  input.slow = btnState.slow || !!keys.KeyX;
}

/* ================= HUD ================= */
const hungerFill = document.getElementById('hungerFill');
const timeTxt = document.getElementById('timeTxt');
const bugTxt = document.getElementById('bugTxt');
const warnBanner = document.getElementById('warnBanner');
const vign = document.getElementById('vignette');
function fmtTime(s){
  const m = Math.floor(s/60), ss = Math.floor(s%60);
  return m + ':' + String(ss).padStart(2,'0');
}
function updateHUD(){
  hungerFill.style.width = clamp(S.hunger,0,100) + '%';
  hungerFill.classList.toggle('low', S.hunger<30);
  timeTxt.textContent = fmtTime(S.time);
  bugTxt.textContent = '🐛 ×' + S.bugs;
  const chased = hawk.chasing || foxes.some(f=>f.chasing);
  warnBanner.style.display = chased ? 'block' : 'none';
  vign.classList.toggle('on', chased);
  if(S.perched){
    btnAct.textContent = 'とびたつ';
    btnAct.classList.add('ready');
  } else {
    btnAct.textContent = 'とまる';
    btnAct.classList.toggle('ready', !!nearPerch());
  }
}

/* ================= 飛行更新 ================= */
const dirVec = new THREE.Vector3();
function angleLerp(cur,target,k){
  let d = target-cur;
  while(d>Math.PI) d-=Math.PI*2; while(d<-Math.PI) d+=Math.PI*2;
  return cur + d*k;
}
function updateFlight(dt){
  if(S.perched){
    const tr = S.perchTree;
    birdBody.velocity.set(0,0,0);
    birdBody.position.set(tr.x, tr.topY+0.45 + Math.sin(S.time*2.2)*0.05, tr.z);
    S.bank *= 0.9; S.pitch *= 0.9;
    // 折りたたんだ翼
    wingL.rotation.z += (1.15-wingL.rotation.z)*Math.min(1,dt*8);
    wingR.rotation.z += (-1.15-wingR.rotation.z)*Math.min(1,dt*8);
    return;
  }
  // 旋回・上下(全体的にゆったりした反応に)
  S.yaw -= input.x * 1.15 * dt * (0.7 + 0.3*Math.min(S.speed/20,1));
  S.bank += ((-input.x*0.7) - S.bank) * Math.min(1,dt*3.5);
  const pitchT = clamp(input.y,-1,1) * 0.8;
  S.pitch += (pitchT - S.pitch) * Math.min(1,dt*2.4);
  S.pitch = clamp(S.pitch,-1.0,1.0);

  // 速度(加減速 + 上昇で減速/急降下で加速)
  let target = input.fast ? 23 : (input.slow ? 7 : 13);
  if(S.hunger<20) target = Math.min(target,16);
  S.speed += (target - S.speed) * Math.min(1,dt*0.7);
  S.speed += -Math.sin(S.pitch) * 9.8 * dt * 0.5;
  S.speed = clamp(S.speed,5.5,30);

  const inWind = applyWind();
  dirVec.set(
    Math.sin(S.yaw)*Math.cos(S.pitch),
    Math.sin(S.pitch),
    Math.cos(S.yaw)*Math.cos(S.pitch));
  birdBody.velocity.set(
    dirVec.x*S.speed + windVel.x,
    dirVec.y*S.speed + windVel.y,
    dirVec.z*S.speed + windVel.z);

  // 羽ばたき(滑空:上昇気流内 or 急降下時は翼を広げる)
  let amp = 0.55, rate = 8 + S.speed*0.28;
  if(inWind && windVel.y>4){ amp = 0.1; rate = 2.5; }
  else if(S.pitch < -0.35){ amp = 0.14; rate = 3; }
  else if(input.fast){ amp = 0.72; }
  S.flapPhase += rate*dt;
  const fs = Math.sin(S.flapPhase);
  wingL.rotation.z += (fs*amp - wingL.rotation.z)*Math.min(1,dt*20);
  wingR.rotation.z = -wingL.rotation.z;
  if(S.lastFlapSin>0 && fs<=0 && amp>0.3) sfx.flap();
  S.lastFlapSin = fs;
}

/* ================= メイン更新 ================= */
function update(dt,t){
  S.time += dt;
  S.hitCd -= dt; S.boundToastCd -= dt;

  pollKeys();
  updateFlight(dt);
  world.step(1/120, dt, 4);

  // 木に衝突
  if(pendingTreeHit){
    pendingTreeHit = false;
    S.hitCd = 0.9;
    S.speed *= 0.42;
    S.hunger = Math.max(0, S.hunger-4);
    S.yaw += rnd(0.5,-0.5);
    sfx.hit();
    vign.classList.add('hit');
    setTimeout(()=>vign.classList.remove('hit'),200);
  }

  // 範囲・高度制限
  const bp = birdBody.position;
  const hr = Math.hypot(bp.x,bp.z);
  if(hr > MAP_R){
    bp.x *= MAP_R/hr; bp.z *= MAP_R/hr;
    const inYaw = Math.atan2(-bp.x,-bp.z);
    S.yaw = angleLerp(S.yaw,inYaw,Math.min(1,dt*1.6));
    if(S.boundToastCd<=0){ toast('これより先には いけないよ'); S.boundToastCd = 4; }
  }
  if(bp.y < GROUND_Y+0.5){ bp.y = GROUND_Y+0.5; if(S.pitch<0) S.pitch = 0.06; }
  if(bp.y > 85){ bp.y = 85; if(S.pitch>0) S.pitch = -0.02; }

  // 見た目へ反映
  bird.position.copy(bp);
  bird.rotation.y = S.yaw;
  bird.rotation.x = -S.pitch*0.85;
  bird.rotation.z = S.bank;
  blobShadow.position.set(bp.x,0.12,bp.z);
  const shf = clamp(1 - bp.y/60, 0.15, 1);
  blobShadow.scale.setScalar(0.6+shf*0.8);
  blobShadow.material.opacity = 0.3*shf;

  // 蝶・てんとう虫をたべる(判定を大きめに)
  for(const b of insects){
    if(bird.position.distanceTo(b.m.position) < 3.2){
      S.hunger = clamp(S.hunger+18,0,100);
      S.bugs++;
      sfx.eat();
      respawnInsect(b,true);
    }
  }
  // 木の実・花をたべる
  for(const f of foods){
    if(bird.position.distanceTo(f.m.position) < 3.4){
      S.hunger = clamp(S.hunger + (f.type==='berry'?24:14),0,100);
      S.bugs++;
      sfx.eat();
      respawnFood(f);
    }
  }

  // 空腹
  const drain = S.perched ? 0.45 : (1.5 + (input.fast?0.9:0));
  S.hunger -= drain*dt;
  if(S.hunger<=0){ S.hunger=0; gameOver('hunger'); return; }

  updateZones(dt);
  updateFox(dt,t);
  if(S.over) return;
  updateHawk(dt,t);
  if(S.over) return;

  updateBGM();
  updateHUD();
}

/* ================= カメラ ================= */
const camTarget = new THREE.Vector3();
const lookTarget = new THREE.Vector3();
let fov = 60;
function updateCamera(dt,t){
  if(!S.running){
    const a = t*0.09;
    camera.position.set(Math.cos(a)*54, 22+Math.sin(t*0.3)*2, Math.sin(a)*54);
    camera.lookAt(0,10,0);
    return;
  }
  if(S.perched){
    const a = t*0.25;
    camTarget.set(
      bird.position.x + Math.cos(a)*6.5,
      bird.position.y + 2.2,
      bird.position.z + Math.sin(a)*6.5);
    camera.position.lerp(camTarget, 1-Math.exp(-2.5*dt));
    camera.lookAt(bird.position);
  } else {
    camTarget.copy(bird.position)
      .addScaledVector(dirVec,-8.5)
      .add(new THREE.Vector3(0,2.8,0));
    if(camTarget.y < 1.3) camTarget.y = 1.3;
    camera.position.lerp(camTarget, 1-Math.exp(-3.2*dt));
    lookTarget.copy(bird.position).addScaledVector(dirVec,6);
    camera.lookAt(lookTarget);
  }
  const fovT = 60 + (S.speed-13)*0.5 + (windVel.y>4?4:0);
  fov += (fovT-fov)*Math.min(1,dt*2);
  camera.fov = fov;
  camera.updateProjectionMatrix();
}

/* ================= 開始・リセット・ゲームオーバー ================= */
const startOverlay = document.getElementById('startOverlay');
const overOverlay = document.getElementById('overOverlay');
function resetGame(){
  S.time=0; S.hunger=100; S.bugs=0;
  S.yaw=0; S.pitch=0; S.bank=0; S.speed=14;
  S.perched=false; S.perchTree=null;
  S.hitCd=0; S.boundToastCd=0; S.over=false;
  pendingTreeHit=false;
  birdBody.position.set(0,16,0);
  birdBody.velocity.set(0,0,0);
  foxes.forEach((fox,i)=>{
    const a = i/FOX_COUNT*Math.PI*2;
    fox.g.position.set(Math.cos(a)*70,0,Math.sin(a)*70);
    fox.chasing=false; fox.hasWp=false; fox.ex.visible=false;
    fox.wanderT=rnd(4,1.5);
  });
  hawk.g.position.set(-90,30,-70); hawk.chasing=false; hawk.cx=-90; hawk.cz=-70; hawk.ex.visible=false;
  for(const b of insects) respawnInsect(b,false);
  for(const f of foods) respawnFood(f);
  while(zones.length){ removeZone(zones.pop()); }
  zoneTimer = 2.5;
  warnBanner.style.display='none';
  vign.classList.remove('on');
}
function startGame(){
  ensureAudio();
  if(AC.state==='suspended') AC.resume();
  resetGame();
  S.running = true;
  bgmNext = AC.currentTime + 0.4; bgmI = 0;
  startOverlay.style.display = 'none';
  overOverlay.style.display = 'none';
}
const REASON = {
  hunger:'おなかがすいて とべなくなった…',
  fox:'🦊 キツネに つかまってしまった！',
  hawk:'🦅 おおきな鳥に つかまってしまった！',
};
function gameOver(reason){
  if(S.over) return;
  S.over = true;
  birdBody.velocity.set(0,0,0);
  sfx.over();
  document.getElementById('overReason').textContent = REASON[reason];
  const score = Math.floor(S.time) + S.bugs*10;
  document.getElementById('overStats').innerHTML =
    `とんだ時間：${fmtTime(S.time)}<br>たべた虫：${S.bugs}ぴき<br>スコア：${score}`;
  warnBanner.style.display='none';
  vign.classList.remove('on');
  overOverlay.style.display = 'flex';
}
document.getElementById('btnStart').addEventListener('pointerdown', e=>{ e.preventDefault(); startGame(); });
document.getElementById('btnRestart').addEventListener('pointerdown', e=>{ e.preventDefault(); startGame(); });

/* ================= メインループ(120Hz対応のdelta-time正規化) ================= */
let lastT = performance.now();
function animate(now){
  requestAnimationFrame(animate);
  let dt = (now-lastT)/1000;
  lastT = now;
  dt = clamp(dt, 0, 0.05);   // タブ復帰・120Hz対策
  const t = now/1000;

  // 環境アニメ(タイトル画面でも動く)
  for(const c of clouds){
    c.g.position.x += c.spd*dt*0.4;
    if(c.g.position.x>260) c.g.position.x = -260;
  }
  updateInsects(dt,t);
  updateFoods(t);
  if(!S.running){
    // タイトル画面:小鳥がその場でホバリング
    S.flapPhase += 7*dt;
    const fs = Math.sin(S.flapPhase)*0.5;
    wingL.rotation.z = fs; wingR.rotation.z = -fs;
    bird.position.set(0,16+Math.sin(t*1.5)*0.5,0);
    bird.rotation.set(0,t*0.4,0);
  } else if(!S.over){
    update(dt,t);
  }
  updateCamera(dt,t);
  updateWindAudio(dt);
  renderer.render(scene,camera);
}
requestAnimationFrame(animate);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
